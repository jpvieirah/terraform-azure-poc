# Caller — PRD Environment
# Chama reusable workflow do digio-tf-workflows
name: "Deploy — PRD"

on:
  push:
    paths: ["terraform/prd/**"]
    branches: [main]

  pull_request:
    paths: ["terraform/prd/**"]
    branches: [main]

  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after plan?"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy:
    uses: ./.github/workflows/terraform-deploy.yml
    with:
      environment: prd
      terraform_dir: terraform/prd
      apply: ${{ github.event.inputs.apply == 'true' || false }}
    secrets: inherit
