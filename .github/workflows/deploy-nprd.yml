# Caller — NPRD Environment
name: "Deploy — NPRD"

on:
  push:
    paths: ["terraform/nprd/**"]
    branches: [main]

  pull_request:
    paths: ["terraform/nprd/**"]
    branches: [main]

  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after plan?"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy:
    uses: ./.github/workflows/terraform-deploy.yml
    with:
      environment: nprd
      terraform_dir: terraform/nprd
      apply: ${{ github.event.inputs.apply == 'true' || false }}
    secrets: inherit
